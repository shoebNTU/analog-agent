[tech]
name = "gf180mcuD"

[type]
name = "opamp"

[opamp]
name = "tsm_single"

[tech_lib]
# Path is relative to the CircuitCollector/CircuitCollector directory.
# Symlink or copy the PDK from your container:
#   ln -s /path/to/gf180mcuD ./PDK/gf180mcuD
pdk_path = "PDK/gf180mcuD"
# Corner names from sm141064.ngspice: typical | ff | ss | fs | sf
corner = "typical"

[testbench.dc]
measure_DC = true
supply_voltage = 3.3
VCM_ratio = 0.5
temperature = 27

[testbench.ac]
measure_AC = true
ac_freq = 100
ac_amp = 500
PARAM_CLOAD = 5.00

[testbench.ibias]
use_ibias = true
multi_ibias = false
ibias = 3e-5

[circuit.params_file]
use_params_file = true
generate_params_file = true
API_mode = false
generate_num_params = 10

[circuit.params_format]
use_width_to_length_ratio = true
ration_field_suffix = "WL_ratio"

[circuit.params_range]
# GF180MCU-D nfet_03v3/pfet_03v3: Lmin = 0.28 um, Wmin = 0.22 um (use 0.5 um for analog)
M1_L_range = [0.28, 5.0, 0.01]
M1_W_range = [0.5, 20.0, 0.1]
M1_M_range = [1, 100, 1]
M1_WL_ratio_range = [1.8, 30.0, 0.1]

M3_L_range = [0.28, 5.0, 0.01]
M3_W_range = [0.5, 20.0, 0.1]
M3_M_range = [1, 100, 1]
M3_WL_ratio_range = [1.8, 30.0, 0.1]

M5_L_range = [0.28, 5.0, 0.01]
M5_W_range = [0.5, 20.0, 0.1]
M5_M_range = [1, 100, 1]
M5_WL_ratio_range = [1.8, 30.0, 0.1]

M7_L_range = [0.28, 5.0, 0.01]
M7_W_range = [0.5, 20.0, 0.1]
M7_M_range = [1, 100, 1]
M7_WL_ratio_range = [1.8, 30.0, 0.1]

C1_value_range = [1e-15, 1e-12, 1e-15]
Rc_value_range = [1e3, 1e6, 1e3]

ibias_range = [1e-6, 1e-4, 1e-6]

[circuit.params]
M1_L = 0.28
M1_WL_ratio = 1.8
M1_M = 1

M3_L = 0.28
M3_WL_ratio = 1.8
M3_M = 1

M5_L = 0.28
M5_WL_ratio = 1.8
M5_M = 1

M7_L = 0.28
M7_WL_ratio = 1.8
M7_M = 1

C1_value = 1e-12
Rc_value = 1e4

[circuit.mosfet_pairs]
M1 = "M2"
M3 = "M4"
M5 = ["M6", "M8"]

[circuit.op_region]
extract_op_region = true
# Inside the nfet_03v3 / pfet_03v3 subcircuit the actual MOSFET instance is m0.
# ngspice OP path: @m.x1.xm1.m0[gm]  → prefix="m", type="0"
device_prefix = "m"
op_variable_list_mos = [
    "gm", "gds", "gmbs",
    "vgs", "vds", "vbs", "vth", "vdsat", "id",
    "cgs", "cgd", "cdb", "csb",
]

[circuit.op_region.transistor_dict]
M1 = "0"
M2 = "0"
M3 = "0"
M4 = "0"
M5 = "0"
M6 = "0"
M7 = "0"
M8 = "0"

[testbench.noise]
measure_noise = true
noise_fstart = 0.1
noise_fstop = "1G"
noise_fspot = 10000

[testbench.slew_rate]
measure_slew_rate = true
sr_vstep = 1.0
sr_tdelay = "10n"
sr_trise = "1n"
sr_tfall = "1n"
sr_tpw = "5u"
sr_tperiod = "10u"
sr_tstep = "1n"
sr_tstop = "20u"

[testbench.output_swing]
measure_output_swing = true
swing_vstep = 0.001

[testbench.mismatch]
measure_mismatch = true
mc_num_runs = 50

[testbench.data]
data_DC = "DC"
data_AC = "AC"
data_GBW_PM = "GBW_PM"
data_NOISE = "NOISE"
data_SLEW_RATE = "SLEW_RATE"
data_OUTPUT_SWING = "OUTPUT_SWING"
data_MISMATCH = "MISMATCH"
