[tech]
name = "gf180mcuD"

[type]
name = "rfpa"

[rfpa]
name = "class_ab_single_ended"
description = "250 MHz, <=10 mA pad-limited class-AB RF PA with output match and H2/H3 traps"
template_only = false
simulation_enabled = true
validation_status = "runnable_seed"

[tech_lib]
pdk_path = "PDK/gf180mcuD"
corner = "typical"

[testbench.dc]
measure_DC = true
supply_voltage = 3.3
temperature = 27
bias_voltage = 0.79137

[testbench.rf]
f0 = 250e6
f_max_pad = 300e6
R_source = 50.0
R_load = 50.0
Pout_target = 2e-3
Pout_target_dbm = 3.0
Pin_available_dbm = -9.0
PAPR_dB = 0.0

[testbench.rf_limits]
I_pad_max = 10e-3
Iout_rms_max = 10e-3
Iout_pk_max = 10e-3
Pdc_max = 33e-3
Max_device_voltage = 3.3
Max_Idc_total = 10e-3

[testbench.sparams]
measure_sparams = true
freq_start = 1e6
freq_stop = 1e9
points_per_decade = 50
Stability_K_min = 1.0
Stability_mu_min = 1.0
S11_max_dB = -10.0
S22_max_dB = -10.0

[testbench.large_signal]
measure_large_signal = true
analysis = "transient_rf"
cycles_settle = 40
cycles_measure = 10
timestep = 0.1e-9
tstop = 200e-9
measure_start = 160e-9
rf_input_vpk = 0.224404
input_power_sweep_dbm = [-20, -15, -12, -9, -6, -3, 0, 3]

[testbench.harmonics]
measure_harmonics = true
max_harmonic = 5
H2_max_dBc = -25.0
H3_max_dBc = -25.0

[testbench.load_pull]
measure_load_pull = true
gamma_mag_points = [0.3333333333]
gamma_angle_deg_points = [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330]

[testbench.power_sweep]
measure_power_sweep = true
input_power_sweep_dbm = [-25, -20, -15, -12, -9, -6, -3, 0, 3]

[testbench.modulated]
measure_modulated = false
EVM_max_percent = 0.0
ACLR_max_dBc = 0.0

[testbench.data]
data_DC = "DC"
data_SPARAM = "SPARAM"
data_LARGE_SIGNAL = "LARGE_SIGNAL"
data_HARMONICS = "HARMONICS"
data_RELIABILITY = "RELIABILITY"
data_LOAD_PULL = "LOAD_PULL"
data_MODULATED = "MODULATED"
data_WAVEFORM = "WAVEFORM"

[circuit.params_file]
use_params_file = true
generate_params_file = true
API_mode = false
generate_num_params = 10

[circuit.params_format]
use_width_to_length_ratio = true
ration_field_suffix = "WL_ratio"

[circuit.params_range]
M1_L_range = [0.28, 2.0, 0.01]
M1_W_range = [0.5, 20.0, 0.1]
M1_M_range = [1, 200, 1]
M1_WL_ratio_range = [1.0, 60.0, 0.1]

Cin_value_range = [1e-15, 10e-12, 1e-15]
Rg_value_range = [100.0, 1e6, 100.0]
# Informational until the RFPA runner supports inductor parameter rendering.
Lchoke_value_range = [1e-9, 1e-6, 1e-9]
bias_voltage_range = [0.4, 1.2, 0.01]

[circuit.params]
M1_L = 0.28
M1_WL_ratio = 40.07
M1_M = 80

Cin_value = 2e-12
Rg_value = 10000
# Informational until the RFPA runner supports inductor parameter rendering.
Lchoke_value = 200e-9
bias_voltage = 0.79137

[circuit.mosfet_pairs]

[circuit.op_region]
extract_op_region = true
device_prefix = "m"
op_variable_list_mos = [
    "gm", "gds", "gmbs",
    "vgs", "vds", "vbs", "vth", "vdsat", "id",
    "cgs", "cgd", "cdb", "csb",
]

[circuit.op_region.transistor_dict]
M1 = "0"
